<!DOCTYPE html>
<html>
<head>
    <title>CSS Styling Assignment</title>

    <!-- Internal CSS -->
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial;
            text-align: center;
        }

        .paragraph {
            color: darkblue;
            font-size: 18px;
            line-height: 1.6;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
            color: red;
        }

        .building {
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            border: 3px solid black;
            background-color: white;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color: red;">CSS Styling Assignment</h1>

    <p class="paragraph">
        This paragraph demonstrates <span class="highlight">internal CSS styling</span> and shows how text can be formatted.
    </p>

    <div class="building">
        This is a building/container styled using CSS. It represents a structured layout with padding, border, and spacing.
    </div>

</body>
</html>
