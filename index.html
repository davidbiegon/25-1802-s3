<!DOCTYPE html>
<html>
<head>
    <title>CSS Combined Layout</title>

    <!-- Internal CSS -->
    <style>
        .para2 {
            color: orange;
            font-weight: bold;
        }

        .highlight-internal {
            background-color: orange;
            font-weight: bold;
        }

        .building2 {
            border: 2px solid black;
            padding: 10px;
            margin: 10px;
            width: 200px;
            text-align: center;
        }

        .h2-style {
            color: green;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>PARAGRAPHS</h1>

    <!-- Paragraphs -->
    <p style="color: blue; font-style: italic;">
        Paragraph 1 : Blue and italic
    </p>

    <p class="para2">
        Paragraph 2 : Orange and bold
    </p>

    <p class="para3">
        Paragraph 3 : Purple and underlined
    </p>

    <hr>

    <h1>HIGHLIGHTS</h1>

    <!-- Highlights -->
    <p>
       Highlight: <span style="background-color: yellow;">Highlight 1</span>
    </p>

    <p>
        Highlight: <span class="highlight-internal">Highlight 2</span>
    </p>

    <p>
        Highlight: <span class="highlight-external">Highlight 3</span>
    </p>

    <hr>

    <h1>BUILDINGS</h1>

    <!-- Buildings -->
    <div style="border: 2px solid black; padding: 10px; margin: 10px; width: 200px; text-align: center;">
        Building 1 
    </div>

    <div class="building2">
        Building 2 
    </div>

    <div class="building3">
        Building 3 
    </div>

</body>
</html>
