<!DOCTYPE html>
<html>
<head>
    <title>Paragraph Styling</title>

    <!-- Internal CSS -->
    <style>
        .para2 {
            color: orange;
            font-weight: bold;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Paragraph 1: Inline CSS (Blue + Italic) -->
    <p style="color: blue; font-style: italic;">
        Paragraph 1: HI DAVID 
    </p>

    <!-- Paragraph 2: Internal CSS (Orange + Bold) -->
    <p class="para2">
        Paragraph 2: IN DAYSTAR.
    </p>

    <!-- Paragraph 3: External CSS (Purple + Underlined) -->
    <p class="para3">
        Paragraph 3: LOVE FOOD.
    </p>

</body>
</html>
